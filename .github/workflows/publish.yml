name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  # Primary registry: npmjs.com, unscoped "llm-ledger", via trusted publishing
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v7
      # No registry-url here: setup-node would write an .npmrc with a
      # placeholder auth token, which makes npm skip the OIDC exchange.
      # Trusted publishing needs no token config at all.
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
      # Trusted publishing needs a recent npm CLI
      - run: npm install -g npm@latest
      - run: npm ci
      # prepublishOnly runs build + tests before the actual publish
      - run: npm publish

  # Mirror: GitHub Packages requires scoped, lowercase names, so the same
  # tarball is published there as @phyoeblitz/llm-ledger.
  publish-github-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://npm.pkg.github.com
          cache: npm
      - run: npm ci
      - run: npm pkg set name=@phyoeblitz/llm-ledger
      # GitHub Packages does not support provenance statements
      - run: npm publish --no-provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
