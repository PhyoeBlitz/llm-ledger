name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org
          cache: npm
      # Trusted publishing needs a recent npm CLI
      - run: npm install -g npm@latest
      - run: npm ci
      # prepublishOnly runs build + tests before the actual publish
      - run: npm publish
