name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # No registry-url here: setup-node would write an .npmrc with a
      # placeholder auth token, which makes npm skip the OIDC exchange.
      # Trusted publishing needs no token config at all.
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
      # Trusted publishing needs a recent npm CLI
      - run: npm install -g npm@latest
      - run: npm ci
      # prepublishOnly runs build + tests before the actual publish
      - run: npm publish
